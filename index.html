<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Cat</title>
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <meta name="theme-color" content="#62c9ed" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="scene-shell">
      <canvas id="glow-scene" aria-label="Interactive glowing sphere"></canvas>

      <section class="controls" aria-label="Glow colour controls" hidden>
        <div class="forecast-readout">
          <span id="expected-value" class="temperature-value">--</span>
          <output id="hex-value" class="hex-value">#800080</output>
        </div>

        <dl class="weather-strip">
          <div>
            <dt>Time</dt>
            <dd id="forecast-time-value">--</dd>
          </div>
          <div>
            <dt>Rain</dt>
            <dd id="rain-value">--</dd>
          </div>
          <div>
            <dt>Next</dt>
            <dd id="next-update-value">--</dd>
          </div>
        </dl>

        <p class="scale-value">
          Scale <span id="scale-min-value">--</span>-<span id="scale-max-value">--</span>
        </p>
        <p id="location-value" class="location-value">Locating...</p>
        <a class="page-link" href="./colour.html">Colour</a>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
