<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js RGB Glow Sphere</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.150.0';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // Boosted exposure slightly to let the internal lights "pop" through the frosted shell
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.8; 
        
        document.body.appendChild(renderer.domElement);

        // 1. THE SPHERE
        const geometry = new THREE.SphereGeometry(1.5, 64, 64);
        const material = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.6,
            roughness: 0.4,
            transmission: 0.01, 
            thickness: 1.5,
            side: THREE.DoubleSide,
            // Added sheen to help the surface catch internal light more vibrantly
            sheen: 1,
            sheenRoughness: 0.5,
            sheenColor: 0xffffff
        });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // 2. LIGHT SOURCES (RGB) - Increased intensity significantly
        const intensity = 80; // Bumped up from 10 to cut through the opacity
        const dist = 100;

        const redLight = new THREE.PointLight(0xff0000, 100, dist);
        scene.add(redLight);

        const greenLight = new THREE.PointLight(0x00ff00, 0, dist);
        scene.add(greenLight);

        const blueLight = new THREE.PointLight(0x0000ff, 0, dist);
        scene.add(blueLight);

        // 3. AMBIENT RIM LIGHT
        const ambient = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(ambient);

        camera.position.z = 4;

        // 4. ANIMATION
        function animate() {
            requestAnimationFrame(animate);
            
            const t = Date.now() * 0.0015;
            
            // Move lights closer to the edge (0.9 instead of 0.7) 
            // This makes the glow on the surface much more intense
            const radius = 0.9;
            greenLight.position.set(Math.cos(t) * radius, Math.sin(t) * radius, 0);
            blueLight.position.set(Math.cos(t + (Math.PI * 2/3)) * radius, Math.sin(t + (Math.PI * 2/3)) * radius, 0);
            redLight.position.set(Math.cos(t + (Math.PI * 4/3)) * radius, Math.sin(t + (Math.PI * 4/3)) * radius, 0);
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
