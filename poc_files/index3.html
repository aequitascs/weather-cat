<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js LED Glow Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- SCENE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- THE SPHERE ---
    const geometry = new THREE.SphereGeometry(1, 64, 64);
    const material = new THREE.MeshStandardMaterial({
        //color: 0xffffff,
        transparent: true,
        opacity: 0.3, // Lowered opacity so internal lights shine through better
        roughness: 0,
        metalness: 0.5
    });
    const sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    // --- INTERNAL LIGHTS ---
    // Moved slightly off-center to ensure they aren't mathematically hidden
    const redLight = new THREE.PointLight(0xff0000, 100, 10);
    redLight.position.set(-0.2, 0, 0.1);
    scene.add(redLight);

    const blueLight = new THREE.PointLight(0x0000ff, 100, 10);
    blueLight.position.set(0.2, 0, 0.1);
    scene.add(blueLight);

    camera.position.z = 3;

    // --- POST-PROCESSING ---
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    
    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight), 
        3.0, // Stronger glow
        0.5, 
        0.0  // Threshold at 0 means EVERYTHING glows
    );
    composer.addPass(bloomPass);

    // --- THE "FIXED" RENDERER ---
    let frameCount = 0;
    function render() {
        // We run the loop for 60 frames (approx 1 second) to ensure 
        // the GPU is "warmed up" and the image is drawn, then we stop.
        if (frameCount < 60) {
            composer.render();
            frameCount++;
            requestAnimationFrame(render);
        } else {
            console.log("Render stabilized and paused to save CPU.");
        }
    }

    render();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
        composer.render();
    });
</script>
</body>
</html>
