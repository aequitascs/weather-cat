<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stacked Gradient Blocks</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        /* Container to hold the overlapping squares */
        .container {
            position: relative;
            width: 300px;
            height: 300px;
        }

        .gradient-box-temp, .gradient-box-rain {
            position: absolute; /* Stack them on top of each other */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .gradient-box-rain {
            opacity: 0.75; 
        }

        .gradient-box-temp {
            background: linear-gradient(to right in hsl, turquoise, red);
            z-index: 1; /* Lower layer */
        }

        .gradient-box-rain {
            background: linear-gradient(to bottom, blue, transparent);
            z-index: 2; /* Upper layer */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gradient-box-temp"></div>
        <div class="gradient-box-rain"></div>
    </div>

</body>
</html>
