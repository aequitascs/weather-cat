<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Evolving RGB Sphere</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.150.0';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.8; 
        document.body.appendChild(renderer.domElement);

        // 1. THE FROSTED SPHERE
        const geometry = new THREE.SphereGeometry(1.5, 64, 64);
        const material = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.6,
            roughness: 0.4,
            transmission: 0.001, 
            thickness: 1.5,
            side: THREE.DoubleSide,
            sheen: 1,
            sheenColor: 0xffffff
        });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // 2. LIGHTS
        const maxIntensity = 10;
        const redLight = new THREE.PointLight(0xff0000, 0, 100);
        const greenLight = new THREE.PointLight(0x00ff00, 0, 100);
        const blueLight = new THREE.PointLight(0x0000ff, 0, 100);
        scene.add(redLight, greenLight, blueLight);

        scene.add(new THREE.AmbientLight(0xffffff, 0.1));
        camera.position.z = 4;

        // 3. TRACKING VARIABLES
        let blueLevel = 0;        // Current intensity of blue
        let lastSinValue = 0;     // To track when a cycle finishes
        const blueIncrement = 1;  // How much blue to add each cycle

        function animate() {
            requestAnimationFrame(animate);
            
            const t = Date.now() * 0.0015;
            const currentSin = Math.sin(t);
            
            // CYCLE DETECTION:
            // If the sine wave just crossed from negative to positive, 
            // a full Red->Green->Red cycle has completed.
            if (lastSinValue < 0 && currentSin >= 0) {
                if (blueLevel < maxIntensity) {
                    blueLevel += blueIncrement;
                    console.log("Cycle Complete! Blue Level:", blueLevel);
                }
            }
            lastSinValue = currentSin;

            // Apply the "Steep" transition logic for Red/Green
            const factor = Math.pow(currentSin, 1) * 0.5 + 0.5;
            
            redLight.intensity = (1 - factor) * maxIntensity;
            greenLight.intensity = factor * maxIntensity;
            
            // Update Blue intensity based on our accumulated level
            blueLight.intensity = blueLevel;

            // Movement
            redLight.position.set(Math.cos(t) * 0.8, Math.sin(t) * 0.8, 0.2);
            greenLight.position.set(Math.cos(t + 2) * 0.8, Math.sin(t + 2) * 0.8, -0.2);
            blueLight.position.set(0, 0, Math.sin(t * 0.5) * 0.5); // Blue pulses in center
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
